<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Sing-in - NotesApp</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" defer src="login.js"></script>
  </head>
  <body>
    <main>
      <section class="auth-card">
        <h1>Enter to your count</h1>
        <p>Enter your information sign in for the notes app</p>

        <div
          id="error-message"
          class="error-banner"
          aria-live="assertive"
          role="alert"
        ></div>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="register-email">email</label>
            <input
              type="email"
              id="register-email"
              name="email"
              required
              autocomplete="username"
              placeholder="name@example.com"
            />
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <input
              type="password"
              id="register-password"
              name="password"
              required
              autocomplete="new-password"
              placeholder="Create a password"
            />
          </div>

          <button class="form-group" type="submit" id="btn-submit">
            Sign in
          </button>
          <div class="register">
            <a href="registerUser.html">create a new count</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>

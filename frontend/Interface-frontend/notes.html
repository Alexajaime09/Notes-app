<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&family=Outfit:wght@100..900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!--  -->
    <script defer type="module" src="app.js"></script>
  </head>
  <body>
    <div class="background"></div>

    <header>
      <h1>My notes</h1>
      <button id="logoutBtn">Logout</button>
    </header>
    <main>
      <section id="controls" aria-label="Filters and searching">
        <input
          type="text"
          id="searchInput"
          placeholder="Searching notes..."
          aria-label="search notes"
        />
      </section>

      <section id="notesContainer">
        <div id="pagination">
          <button id="prevButton">Previous</button>
          <span id="pageInfo"></span>
          <button id="nextButton">next Page</button>
        </div>
      </section>

      <button id="addNoteBtn" aria-label="Create new Note">+</button>
    </main>
    <div id="noteModal" class="hidden" aria-hidden="true">
      <div class="modal-content"></div>
      <form clas="noteForm" id="noteForm" action="">
        <input
          name="title"
          type="text"
          id="title"
          required
          placeholder="Title"
        />
        <textarea
          id="content"
          name="content"
          required
          placeholder="write your note"
        ></textarea>
        <input
          name="tags"
          type="text"
          id="tags"
          placeholder="tags (comma-separated )"
        />
        <button class="save-btn" id="saveNote" type="submit">Save Note</button>
      </form>
    </div>
  </body>
</html>

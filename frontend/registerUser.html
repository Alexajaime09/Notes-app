<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Register - NotesApp</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="service.js"></script>
  </head>
  <body>
    <main>
      <section class="auth-card">
        <h1>Create an account</h1>
        <p>Enter your information sign up for the notes app</p>

        <div
          id="error-message"
          class="error-banner"
          aria-live="assertive"
          role="alert"
          hidden
        ></div>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="register-name">Name</label>
            <input
              type="text"
              id="register-name"
              name="name"
              autocomplete="name"
              placeholder="Your name optional"
            />
          </div>
          <div class="form-group">
            <label for="register-email">email</label>
            <input
              type="email"
              id="register-email"
              name="email"
              required
              autocomplete="username"
              placeholder="name@example.com"
            />
          </div>

          <div class="form-grup">
            <label for="register-passwors">Password</label>
            <input
              type="password"
              id="register-password"
              name="password"
              required
              autocomplete="new-password"
              placeholder="Create a password"
            />
          </div>

          <button type="submit" id="btn-submit">Sign up</button>
        </form>
      </section>
    </main>
  </body>
</html>
